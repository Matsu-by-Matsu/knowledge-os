.app{display:grid;grid-template-columns:280px 1fr 360px;min-height:100vh}

.brand{font-size:26px;font-weight:900;letter-spacing:-.04em;margin-bottom:4px} .sub{font-size:12px;color:var(--muted);margin-bottom:24px}
.nav{display:grid;gap:8px} .nav button{text-align:left;border:1px solid transparent;background:transparent;color:var(--text);padding:12px 13px;border-radius:14px;font-weight:700;cursor:pointer}
.nav button.active,.nav button:hover{background:var(--panel);border-color:var(--line)}
.main{padding:28px;overflow:auto} .top{display:flex;gap:12px;align-items:center;margin-bottom:18px}
.search{flex:1} input,textarea,select{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.07);color:var(--text);border-radius:14px;padding:13px 14px;outline:none}
textarea{min-height:110px;resize:vertical} button.primary{border:0;border-radius:14px;padding:13px 16px;background:linear-gradient(135deg,var(--blue),var(--purple));color:white;font-weight:900;cursor:pointer;box-shadow:0 14px 34px rgba(91,124,250,.25)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0 22px} .stat{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px} .stat b{font-size:26px} .stat span{display:block;color:var(--muted);font-size:12px;margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:14px} .card{position:relative;background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.045));border:1px solid var(--line);border-radius:22px;padding:18px;cursor:pointer;transition:.2s;min-height:210px;overflow:hidden}
.card:hover{transform:translateY(-3px);border-color:rgba(91,124,250,.55);box-shadow:0 18px 46px rgba(0,0,0,.28)} .card h3{margin:12px 0 9px;font-size:18px;line-height:1.35;letter-spacing:-.02em} .meta{color:var(--muted);font-size:12px;display:flex;gap:8px;flex-wrap:wrap} .summary{color:#cbd5e1;font-size:13px;line-height:1.65;margin:12px 0} .tags{display:flex;gap:6px;flex-wrap:wrap;position:absolute;bottom:16px;left:18px;right:18px} .tag{font-size:11px;color:#dbeafe;background:rgba(91,124,250,.18);border:1px solid rgba(91,124,250,.22);padding:5px 8px;border-radius:999px} .badge{display:inline-block;font-size:11px;font-weight:900;padding:5px 9px;border-radius:999px} .high{background:rgba(251,113,133,.18);color:#fecdd3} .mid{background:rgba(245,158,11,.18);color:#fde68a} .low{background:rgba(34,197,94,.18);color:#bbf7d0}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.68);display:none;align-items:center;justify-content:center;padding:20px;z-index:10} .modal.on{display:flex} .modalin{width:min(760px,100%);max-height:92vh;overflow:auto;background:#0f172a;border:1px solid var(--line);border-radius:24px;padding:22px} .formgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px} label{font-size:12px;color:var(--muted);font-weight:800} .field{display:grid;gap:6px;margin-bottom:12px}

<div class="app">
<aside class="side">

  <p class="small" style="margin-top:14px">※この版はChatGPT履歴を初期データとして投入済み。URLは手動で入れる仕様。</p>
</aside>

<main class="main">
  <div class="top">
    <div class="search"><input id="q" placeholder="検索：Omotesando / Synth X / PowerShell / 英語..."></div>
    <button class="primary" onclick="openEditor()">新規追加</button>
  </div>
  <section class="stats">
    <div class="stat"><b id="sAll">0</b><span>全ノード</span></div>
    <div class="stat"><b id="sHigh">0</b><span>重要度 high</span></div>
    <div class="stat"><b id="sCat">0</b><span>カテゴリ</span></div>
    <div class="stat"><b id="sSrc">0</b><span>ソース</span></div>
  </section>
  <div class="grid" id="grid"></div>
</main>

<aside class="detail" id="detail">
  <div class="small">Selected Node</div>
  <h2>カードを選択</h2>
  <div class="box small">左のカードを押すと、ここに要約・タグ・URL・編集ボタンが出る。</div>
</aside>
</div>

<div class="modal" id="modal">
  <div class="modalin">

    <div class="formgrid">

      <div class="field"><label>Importance</label><select id="fImportance"><option>high</option><option>mid</option><option>low</option></select></div>
      <div class="field"><label>Category</label><input id="fCategory"></div>
      <div class="field"><label>Subcategory</label><input id="fSubcategory"></div>
      <div class="field"><label>Date</label><input id="fDate"></div>
      <div class="field"><label>Source</label><select id="fSource"><option>chatgpt</option><option>claude</option><option>notebooklm</option><option>manual</option></select></div>
    </div>
    <div class="field"><label>URL</label><input id="fUrl"></div>
    <div class="field"><label>Tags（カンマ区切り）</label><input id="fTags"></div>
    <div class="field"><label>Summary</label><textarea id="fSummary"></textarea></div>
    <div class="actions" style="grid-template-columns:1fr 1fr">
      <button onclick="closeModal()">Cancel</button>
      <button onclick="saveItem()" class="primary">Save</button>
    </div>
  </div>
</div>

<div class="modal" id="importModal">
  <div class="modalin">
    <h2>JSON取込</h2>

    <div class="actions" style="grid-template-columns:1fr 1fr 1fr">

      <button onclick="resetSeed()">初期データ復元</button>

    </div>
  </div>
</div>

let data = JSON.parse(localStorage.getItem("matsu_knowledge_v3") || "null") || SEED;
let selected = null;
let editing = null;
let activeCat = "ALL";

function saveLocal(){ localStorage.setItem("matsu_knowledge_v3", JSON.stringify(data)); }
function cats(){ return ["ALL", ...Array.from(new Set(data.map(x=>x.category||"未分類")))]; }
function filtered(){
  const q = document.getElementById("q").value.toLowerCase();
  return data.filter(x => (activeCat==="ALL" || x.category===activeCat) &&
    [x.title,x.summary,x.category,x.subcategory,(x.tags||[]).join(" "),x.source].join(" ").toLowerCase().includes(q));
}
function renderNav(){
  const n=document.getElementById("nav"); n.innerHTML="";
  cats().forEach(c=>{
    const count = c==="ALL" ? data.length : data.filter(x=>x.category===c).length;
    const b=document.createElement("button");
    b.className = c===activeCat ? "active" : "";
    b.innerHTML = `${c==="ALL"?"🧠":icon(c)} ${c} <span style="float:right;color:#94a3b8">${count}</span>`;
    b.onclick=()=>{activeCat=c; render();};
    n.appendChild(b);
  });
}
function icon(c){
  if(c.includes("不動産")) return "🏢";
  if(c.includes("新規")) return "🚀";
  if(c.includes("テクノロジー")) return "💻";
  if(c.includes("ライフ")) return "🚗";
  if(c.includes("X")) return "✍️";
  return "📁";
}
function render(){
  renderNav();
  const arr=filtered();
  document.getElementById("sAll").textContent=data.length;
  document.getElementById("sHigh").textContent=data.filter(x=>x.importance==="high").length;
  document.getElementById("sCat").textContent=new Set(data.map(x=>x.category)).size;
  document.getElementById("sSrc").textContent=new Set(data.map(x=>x.source)).size;
  const g=document.getElementById("grid"); g.innerHTML="";
  arr.forEach((x,i)=>{
    const realIndex=data.indexOf(x);
    const div=document.createElement("div");
    div.className="card";
    div.onclick=()=>selectItem(realIndex);
    div.innerHTML=`<div class="meta"><span class="badge ${x.importance}">${x.importance}</span><span>${x.source||""}</span><span>${x.date||""}</span></div>
    <h3>${esc(x.title)}</h3>
    <div class="meta">${esc(x.category||"")} / ${esc(x.subcategory||"")}</div>
    <div class="summary">${esc(x.summary||"")}</div>
    <div class="tags">${(x.tags||[]).slice(0,4).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div>`;
    g.appendChild(div);
  });
  saveLocal();
}
function selectItem(idx){
  selected=idx; const x=data[idx];
  document.getElementById("detail").style.display="block";
  document.getElementById("detail").innerHTML=`<div class="small">Selected Node</div>
  <h2>${esc(x.title)}</h2>
  <div class="meta"><span class="badge ${x.importance}">${x.importance}</span><span>${esc(x.source||"")}</span><span>${esc(x.date||"")}</span></div>
  <div class="box"><b>Category</b><br>${esc(x.category||"")} / ${esc(x.subcategory||"")}</div>
  <div class="box"><b>Summary</b><br><span class="small">${esc(x.summary||"")}</span></div>
  <div class="box"><b>Tags</b><br>${(x.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join(" ")}</div>
  <div class="actions">
    <button onclick="openUrl()">スレッドを開く</button>
    <button onclick="editSelected()">編集</button>
    <button class="danger" onclick="deleteSelected()">削除</button>
  </div>`;
}
function openUrl(){ const x=data[selected]; if(x && x.url) window.open(x.url,"_blank"); else alert("URL未登録。編集からURLを入れて。"); }
function editSelected(){ openEditor(selected); }
function deleteSelected(){ if(selected!==null && confirm("削除する？")){ data.splice(selected,1); selected=null; render(); document.getElementById("detail").innerHTML='<div class="small">Selected Node</div><h2>削除済み</h2>'; } }
function openEditor(idx=null){
  editing=idx;
  const x = idx===null ? {title:"",importance:"mid",category:"",subcategory:"",date:"",source:"chatgpt",url:"",summary:"",tags:[]} : data[idx];
  document.getElementById("modalTitle").textContent = idx===null ? "Add Knowledge" : "Edit Knowledge";
  fTitle.value=x.title||""; fImportance.value=x.importance||"mid"; fCategory.value=x.category||""; fSubcategory.value=x.subcategory||"";
  fDate.value=x.date||""; fSource.value=x.source||"chatgpt"; fUrl.value=x.url||""; fSummary.value=x.summary||""; fTags.value=(x.tags||[]).join(", ");
  modal.classList.add("on");
}
function closeModal(){ modal.classList.remove("on"); }
function saveItem(){
  const item={title:fTitle.value,importance:fImportance.value,category:fCategory.value,subcategory:fSubcategory.value,date:fDate.value,source:fSource.value,url:fUrl.value,summary:fSummary.value,tags:fTags.value.split(",").map(s=>s.trim()).filter(Boolean)};
  if(editing===null) data.unshift(item); else data[editing]=item;
  closeModal(); render(); if(editing!==null) selectItem(editing);
}
function openImport(){ importModal.classList.add("on"); }
function closeImport(){ importModal.classList.remove("on"); }
function doImport(){
  try {
    const arr=JSON.parse(importText.value);
    if(!Array.isArray(arr)) throw new Error("配列じゃない");
    const normalized=arr.map(x=>({title:x.title||"",url:x.url||"",category:x.category||"未分類",subcategory:x.subcategory||"",importance:x.importance||"mid",summary:x.summary||"",date:x.date||"",source:x.source||"chatgpt",tags:x.tags||[x.category,x.subcategory].filter(Boolean)}));
    data=[...normalized,...data];
    closeImport(); render(); alert(`${normalized.length}件取り込み完了`);
  } catch(e) { alert("JSONが読めない。先頭が [ 、末尾が ] になってるか確認。"); }
}
function resetSeed(){ if(confirm("初期データに戻す？")){ data=SEED; closeImport(); render(); } }
function esc(s){ return String(s||"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
q.addEventListener("input", render);
