<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Matsu Knowledge OS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#050816;--panel:rgba(255,255,255,.07);--panel2:rgba(255,255,255,.11);
--line:rgba(255,255,255,.12);--text:#f8fafc;--muted:#94a3b8;
--blue:#5b7cfa;--purple:#8b5cf6;--cyan:#22d3ee;--red:#fb7185;--yellow:#f59e0b;--green:#22c55e;
}
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:
radial-gradient(circle at 10% 0%,rgba(91,124,250,.34),transparent 30%),
radial-gradient(circle at 95% 20%,rgba(34,211,238,.22),transparent 28%),
radial-gradient(circle at 65% 100%,rgba(139,92,246,.20),transparent 35%),
var(--bg);
color:var(--text);min-height:100vh;
}
.app{display:grid;grid-template-columns:280px 1fr 380px;min-height:100vh}
.side{padding:22px;border-right:1px solid var(--line);background:rgba(5,8,18,.55);backdrop-filter:blur(22px);height:100vh;position:sticky;top:0;overflow:auto}
.logo{font-size:27px;font-weight:900;letter-spacing:-.04em}
.sub{font-size:12px;color:var(--muted);margin:4px 0 22px;line-height:1.5}
.nav{display:grid;gap:8px}
.nav button{text-align:left;border:1px solid transparent;background:transparent;color:var(--text);padding:12px;border-radius:14px;font-weight:800;cursor:pointer}
.nav button.active,.nav button:hover{background:var(--panel);border-color:var(--line)}
.sideActions{display:grid;gap:9px;margin-top:16px}
.btn{border:1px solid var(--line);border-radius:14px;padding:12px 14px;background:var(--panel);color:white;font-weight:900;cursor:pointer}
.primary{border:0;background:linear-gradient(135deg,var(--blue),var(--purple));box-shadow:0 14px 34px rgba(91,124,250,.22)}
.main{padding:28px;overflow:auto}
.top{display:flex;gap:12px;align-items:center;margin-bottom:16px}
.search{flex:1}
input,select,textarea{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.075);color:var(--text);border-radius:14px;padding:13px 14px;outline:none}
textarea{min-height:120px;resize:vertical}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0 22px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px}
.stat b{font-size:28px}
.stat span{display:block;color:var(--muted);font-size:12px;margin-top:3px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:14px}
.card{position:relative;min-height:245px;background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.045));border:1px solid var(--line);border-radius:22px;padding:18px;cursor:pointer;transition:.2s;overflow:hidden}
.card:hover{transform:translateY(-3px);border-color:rgba(91,124,250,.55);box-shadow:0 18px 46px rgba(0,0,0,.28)}
.card h3{margin:12px 0 9px;font-size:18px;line-height:1.35;letter-spacing:-.02em}
.meta{color:var(--muted);font-size:12px;display:flex;gap:8px;flex-wrap:wrap}
.summary{color:#cbd5e1;font-size:13px;line-height:1.65;margin:12px 0}
.highlightMini{font-size:12px;line-height:1.55;color:#e0f2fe;background:rgba(34,211,238,.10);border:1px solid rgba(34,211,238,.16);border-radius:14px;padding:10px;margin-bottom:44px}
.tags{display:flex;gap:6px;flex-wrap:wrap;position:absolute;bottom:16px;left:18px;right:18px}
.tag{font-size:11px;color:#dbeafe;background:rgba(91,124,250,.18);border:1px solid rgba(91,124,250,.22);padding:5px 8px;border-radius:999px}
.scoreBadge{display:inline-block;font-size:12px;font-weight:900;padding:6px 10px;border-radius:999px;background:rgba(91,124,250,.22);color:#dbeafe}
.scoreHot{background:rgba(251,113,133,.22);color:#fecdd3}
.scoreMid{background:rgba(245,158,11,.22);color:#fde68a}
.scoreLow{background:rgba(34,197,94,.20);color:#bbf7d0}
.scoreInput{width:90px!important;padding:8px 10px!important;border-radius:10px!important;text-align:center;font-weight:900}
.detail{padding:22px;border-left:1px solid var(--line);background:rgba(5,8,18,.48);backdrop-filter:blur(22px);height:100vh;position:sticky;top:0;overflow:auto}
.detail h2{font-size:23px;line-height:1.25;margin:10px 0}
.box{border:1px solid var(--line);border-radius:18px;background:var(--panel);padding:14px;margin:12px 0}
.small{font-size:12px;color:var(--muted);line-height:1.6}
.actions{display:grid;gap:9px;margin-top:14px}
.danger{background:rgba(251,113,133,.14)!important}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.70);display:none;align-items:center;justify-content:center;padding:20px;z-index:20;backdrop-filter:blur(10px)}
.modal.on{display:flex}
.modalin{width:min(820px,100%);max-height:92vh;overflow:auto;background:#0f172a;border:1px solid var(--line);border-radius:24px;padding:22px}
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:grid;gap:6px;margin-bottom:12px}
label{font-size:12px;color:var(--muted);font-weight:900}
.importArea{font-family:ui-monospace,Menlo,monospace;min-height:260px}
a{color:#93c5fd}
@media(max-width:1100px){
.app{grid-template-columns:1fr}
.side,.detail{position:relative;height:auto;border:0}
.side{border-bottom:1px solid var(--line)}
.nav{grid-template-columns:repeat(2,1fr)}
.stats{grid-template-columns:repeat(2,1fr)}
.top{flex-direction:column}
.grid{grid-template-columns:1fr}
.detail{display:none}
.formgrid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
<aside class="side">
<div class="logo">Matsu Knowledge OS</div>
<div class="sub">全スレッド0点スタート。点数は自分で編集。ハイライト付き。</div>
<div class="nav" id="nav"></div>
<div class="sideActions">
<button class="btn primary" onclick="openEditor()">＋ Add</button>
<button class="btn" onclick="openImport()">JSON取込</button>
<button class="btn" onclick="exportJson()">JSON Export</button>
<button class="btn danger" onclick="resetSeed()">初期データ復元</button>
</div>
</aside>

<main class="main">
<div class="top">
<div class="search"><input id="q" placeholder="検索：Omotesando / Synth X / PowerShell / 英語 / 車..."></div>
<button class="btn primary" onclick="openEditor()">新規追加</button>
</div>
<section class="stats">
<div class="stat"><b id="sAll">0</b><span>全ノード</span></div>
<div class="stat"><b id="sHigh">0</b><span>80点以上</span></div>
<div class="stat"><b id="sCat">0</b><span>カテゴリ</span></div>
<div class="stat"><b id="sSrc">0</b><span>ソース</span></div>
</section>
<div class="grid" id="grid"></div>
</main>

<aside class="detail" id="detail">
<div class="small">Selected Node</div>
<h2>カードを選択</h2>
<div class="box small">カードを押すと、要約・ハイライト・タグ・URL・編集・削除がここに出る。</div>
</aside>
</div>

<div class="modal" id="modal">
<div class="modalin">
<h2 id="modalTitle">Edit</h2>
<div class="formgrid">
<div class="field"><label>Title</label><input id="fTitle"></div>
<div class="field"><label>Score（0〜100）</label><input id="fScore" type="number" min="0" max="100" step="1"></div>
<div class="field"><label>Category</label><input id="fCategory"></div>
<div class="field"><label>Subcategory</label><input id="fSubcategory"></div>
<div class="field"><label>Date</label><input id="fDate"></div>
<div class="field"><label>Source</label><select id="fSource"><option>chatgpt</option><option>claude</option><option>notebooklm</option><option>manual</option></select></div>
</div>
<div class="field"><label>URL</label><input id="fUrl" placeholder="ChatGPT/Claude/NotebookLMのスレッドURL"></div>
<div class="field"><label>Tags（カンマ区切り）</label><input id="fTags"></div>
<div class="field"><label>Summary</label><textarea id="fSummary"></textarea></div>
<div class="field"><label>Highlight</label><textarea id="fHighlight"></textarea></div>
<div class="actions" style="grid-template-columns:1fr 1fr">
<button class="btn" onclick="closeModal()">Cancel</button>
<button class="btn primary" onclick="saveItem()">Save</button>
</div>
</div>
</div>

<div class="modal" id="importModal">
<div class="modalin">
<h2>JSON取込</h2>
<p class="small">ChatGPT / Claude / NotebookLM で出したJSON配列を貼る。score未指定なら0点で入る。</p>
<textarea id="importText" class="importArea" placeholder='[{"title":"...","url":"","category":"...","subcategory":"...","score":0,"summary":"...","highlight":"...","date":"2026/05/23","source":"chatgpt","tags":["..."]}]'></textarea>
<div class="actions" style="grid-template-columns:1fr 1fr">
<button class="btn" onclick="closeImport()">Cancel</button>
<button class="btn primary" onclick="doImport()">Import</button>
</div>
</div>
</div>

<script>
const SEED = [{"title": "GitHubアクセスエラー対処法", "url": "", "category": "テクノロジー学習", "subcategory": "GitHub/ネットワーク", "score": 0, "summary": "GitHubに入れない問題の切り分け。Google検索は可能でネット自体は動いている前提。", "highlight": "GitHub接続不良を、ネット全体の問題ではなくGitHub側・ブラウザ側・認証側に切り分ける発想。", "date": "2026/05/23", "source": "chatgpt", "tags": ["GitHub", "ネットワーク", "トラブル"]}, {"title": "待機時間予測", "url": "", "category": "ライフスタイル", "subcategory": "外出/待ち時間", "score": 0, "summary": "順番待ちの残り時間と、グレー空席を作っている理由を推測。", "highlight": "待ち順・空席運用から、店側のオペレーション都合を推測する小ネタ。", "date": "2026/05/23", "source": "chatgpt", "tags": ["外出", "待ち時間"]}, {"title": "会話まとめJSON出力", "url": "", "category": "テクノロジー学習", "subcategory": "Knowledge OS", "score": 0, "summary": "今月のChatGPT会話をJSON配列で整理するためのフォーマットを指定。", "highlight": "Knowledge OSの入口。会話履歴を構造化データに変える最初の設計。", "date": "2026/05/22", "source": "chatgpt", "tags": ["JSON", "会話整理", "Knowledge OS"]}, {"title": "PJ名提案と選定", "url": "", "category": "不動産ビジネス", "subcategory": "英語メール/IC対応", "score": 0, "summary": "Steve向けメール、件名、写真共有、ICメモ事前レビューへの返信英文を調整。", "highlight": "目上のICメンバー向けに、丁寧さと簡潔さのバランスを調整した実務英語。", "date": "2026/04/30", "source": "chatgpt", "tags": ["英語", "IC", "Steve", "メール"]}, {"title": "Proforma英訳提案", "url": "", "category": "不動産ビジネス", "subcategory": "英訳/投資メモ", "score": 0, "summary": "PJ Apex関連のメモ送付、Portfolio Analysis依頼、FIC予定などを英語化。", "highlight": "FIC予定やPortfolio Analysis依頼など、投資実務メールの英語化を細かく調整。", "date": "2026/05/14", "source": "chatgpt", "tags": ["Apex", "FIC", "英訳"]}, {"title": "探偵になる方法", "url": "", "category": "ライフスタイル", "subcategory": "雑談/キャリア", "score": 0, "summary": "コナンに憧れた文脈で、探偵になる現実的な方法を整理。", "highlight": "コナン憧れから、現実の探偵業のなり方へ落とす雑談。", "date": "2026/05/21", "source": "chatgpt", "tags": ["探偵", "雑談"]}, {"title": "東京オフィス市場分析", "url": "", "category": "不動産ビジネス", "subcategory": "市場レポート翻訳", "score": 0, "summary": "PJ Apex R&SドラフトPDFの全文日本語訳と要約を依頼。", "highlight": "東京オフィス市場の外部レポートを、投資判断に使える形で訳す流れ。", "date": "2026/05/20", "source": "chatgpt", "tags": ["東京オフィス", "翻訳", "R&S"]}, {"title": "STO分配金の違和感", ory": "不動産ビジネス", "subcategory": "共有/法務", "score": 0, "summary": "土地共有持分8%と建物完全所有の場合、取り壊しに共有者同意が必要か検討。", "highlight": "土地共有者の同意権限と建物所有者の取り壊し判断を切り分け。", "date": "2026/04/30", "source": "chatgpt", "tags": ["共有", "取り壊し", "法務"]}];
let data = JSON.parse(localStorage.getItem("matsu_knowledge_zero_v1") || "null") || SEED;
data = data.map(normalizeLegacy);
let activeCat = "ALL";
let selected = null;
let editing = null;

function clampScore(v){return Math.max(0,Math.min(100,Number(v)||0));}
function scoreClass(s){s=Number(s||0);return s>=80?"scoreHot":s>=50?"scoreMid":"scoreLow";}
function sortByScore(arr){return arr.slice().sort((a,b)=>(Number(b.score||0)-Number(a.score||0)) || String(b.date||"").localeCompare(String(a.date||"")));}
function saveLocal(){localStorage.setItem("matsu_knowledge_zero_v1",JSON.stringify(data));}
function normalizeLegacy(x){
if(x.score===undefined) x.score=0;
delete x.importance;
x.score=clampScore(x.score);
if(!x.highlight) x.highlight="";
return x;
}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function categories(){return ["ALL",...Array.from(new Set(data.map(x=>x.category||"未分類")))];}
function icon(c){if(c.includes("不動産"))return"🏢";if(c.includes("新規"))return"🚀";if(c.includes("テクノロジー"))return"💻";if(c.includes("ライフ"))return"🚗";if(c.includes("X"))return"✍️";return"📁";}
function filtered(){
const q=document.getElementById("q").value.toLowerCase();
return sortByScore(data.filter(x=>(activeCat==="ALL"||x.category===activeCat)&&[x.title,x.summary,x.highlight,x.category,x.subcategory,(x.tags||[]).join(" "),x.source,x.date].join(" ").toLowerCase().includes(q)));
}
function renderNav(){
const n=document.getElementById("nav");n.innerHTML="";
categories().forEach(c=>{
const count=c==="ALL"?data.length:data.filter(x=>x.category===c).length;
const b=document.createElement("button");
b.className=c===activeCat?"active":"";
b.innerHTML=`${c==="ALL"?"🧠":icon(c)} ${esc(c)} <span style="float:right;color:#94a3b8">${count}</span>`;
b.onclick=()=>{activeCat=c;render();};
n.appendChild(b);
});
}
function render(){
data=sortByScore(data);
renderNav();
const arr=filtered();
sAll.textContent=data.length;
sHigh.textContent=data.filter(x=>(x.score||0)>=80).length;
sCat.textContent=new Set(data.map(x=>x.category)).size;
sSrc.textContent=new Set(data.map(x=>x.source)).size;
grid.innerHTML="";
arr.forEach(x=>{
const idx=data.indexOf(x);
const div=document.createElement("div");
div.className="card";
div.onclick=()=>selectItem(idx);
div.innerHTML=`<div class="meta"><span class="scoreBadge ${scoreClass(x.score)}">${Number(x.score||0)} pts</span><span>${esc(x.source||"")}</span><span>${esc(x.date||"")}</span></div>
<h3>${esc(x.title)}</h3>
<div class="meta">${esc(x.category||"")} / ${esc(x.subcategory||"")}</div>
<div class="summary">${esc(x.summary||"")}</div>
<div class="highlightMini">★ ${esc(x.highlight||"")}</div>
<div class="tags">${(x.tags||[]).slice(0,4).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div>`;
grid.appendChild(div);
});
saveLocal();
}
function selectItem(idx){
selected=idx;const x=data[idx];
detail.style.display="block";
detail.innerHTML=`<div class="small">Selected Node</div>
<h2>${esc(x.title)}</h2>
<div class="meta"><span class="scoreBadge ${scoreClass(x.score)}">${Number(x.score||0)} pts</span><span>${esc(x.source||"")}</span><span>${esc(x.date||"")}</span></div>
<div class="box"><b>Score</b><br><input class="scoreInput" type="number" min="0" max="100" value="${Number(x.score||0)}" onchange="quickScore(this.value)"></div>
<div class="box"><b>Category</b><br>${esc(x.category||"")} / ${esc(x.subcategory||"")}</div>
<div class="box"><b>Summary</b><br><span class="small">${esc(x.summary||"")}</span></div>
<div class="box"><b>Highlight</b><br><span class="small">${esc(x.highlight||"")}</span></div>
<div class="box"><b>URL</b><br><span class="small">${x.url?esc(x.url):"URL未登録"}</span></div>
<div class="box"><b>Tags</b><br>${(x.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join(" ")}</div>
<div class="actions">
<button class="btn" onclick="openUrl()">スレッドを開く</button>
<button class="btn" onclick="editSelected()">編集</button>
<button class="btn danger" onclick="deleteSelected()">削除</button>
</div>`;
}
function quickScore(v){if(selected===null)return;const item=data[selected];item.score=clampScore(v);render();selected=data.indexOf(item);selectItem(selected);}
function openUrl(){const x=data[selected];if(x&&x.url)window.open(x.url,"_blank");else alert("URL未登録。編集からURLを入れて。");}
function editSelected(){openEditor(selected);}
function deleteSelected(){if(selected!==null&&confirm("削除する？")){data.splice(selected,1);selected=null;render();detail.innerHTML='<div class="small">Selected Node</div><h2>削除済み</h2>';}}
function openEditor(idx=null){
editing=idx;
const x=idx===null?{title:"",score:0,category:"",subcategory:"",date:"",source:"chatgpt",url:"",summary:"",highlight:"",tags:[]}:data[idx];
modalTitle.textContent=idx===null?"Add Knowledge":"Edit Knowledge";
fTitle.value=x.title||"";fScore.value=Number(x.score ?? 0);fCategory.value=x.category||"";fSubcategory.value=x.subcategory||"";
fDate.value=x.date||"";fSource.value=x.source||"chatgpt";fUrl.value=x.url||"";fSummary.value=x.summary||"";fHighlight.value=x.highlight||"";fTags.value=(x.tags||[]).join(", ");
modal.classList.add("on");
}
function closeModal(){modal.classList.remove("on");}
function saveItem(){
const item={title:fTitle.value,score:clampScore(fScore.value),category:fCategory.value,subcategory:fSubcategory.value,date:fDate.value,source:fSource.value,url:fUrl.value,summary:fSummary.value,highlight:fHighlight.value,tags:fTags.value.split(",").map(s=>s.trim()).filter(Boolean)};
if(editing===null)data.unshift(item);else data[editing]=item;
closeModal();render();if(editing!==null)selectItem(data.indexOf(item));
}
function openImport(){importModal.classList.add("on");}
function closeImport(){importModal.classList.remove("on");}
function normalize(x){return {title:x.title||"",url:x.url||"",category:x.category||"未分類",subcategory:x.subcategory||"",score:clampScore(x.score ?? 0),summary:x.summary||"",highlight:x.highlight||"",date:x.date||"",source:x.source||"chatgpt",tags:Array.isArray(x.tags)?x.tags:[x.category,x.subcategory].filter(Boolean)};}
function doImport(){
try{const arr=JSON.parse(importText.value);if(!Array.isArray(arr))throw new Error("not array");const add=arr.map(normalize);data=[...add,...data];closeImport();render();alert(add.length+"件取り込み完了");}
catch(e){alert("JSONが読めない。先頭が [ 、末尾が ] か確認。");}
}
function resetSeed(){if(confirm("初期データに戻す？")){data=SEED.map(normalizeLegacy);selected=null;render();}}
function exportJson(){
const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="matsu-knowledge.json";a.click();
}
q.addEventListener("input",render);
render();
</script>
