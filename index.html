<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Matsu AI OS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#0b1020;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

.sidebar{
width:280px;
background:#11182d;
padding:24px;
border-right:1px solid rgba(255,255,255,.08);
overflow:auto;
}

.logo{
font-size:28px;
font-weight:700;
margin-bottom:32px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu-item{
padding:14px 16px;
border-radius:14px;
cursor:pointer;
transition:.2s;
background:transparent;
}

.menu-item:hover{
background:#1b2542;
}

.main{
flex:1;
padding:32px;
overflow:auto;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:28px;
gap:16px;
}

.search{
flex:1;
}

.search input{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:#151d35;
color:white;
font-size:15px;
}

.add-btn{
padding:14px 18px;
border:none;
border-radius:14px;
background:#4f7cff;
color:white;
font-weight:700;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:20px;
}

.card{
background:linear-gradient(180deg,#151d35,#101726);
padding:22px;
border-radius:22px;
cursor:pointer;
transition:.25s;
border:1px solid rgba(255,255,255,.06);
}

.card:hover{
transform:translateY(-4px);
border-color:#4f7cff;
}

.card-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.badge{
padding:6px 10px;
border-radius:999px;
font-size:12px;
font-weight:700;
}

.high{
background:#ff4d4f;
}

.mid{
background:#faad14;
}

.low{
background:#52c41a;
}

.card-title{
font-size:20px;
font-weight:700;
margin-bottom:12px;
line-height:1.4;
}

.card-summary{
opacity:.75;
line-height:1.7;
font-size:14px;
margin-bottom:16px;
}

.tags{
display:flex;
flex-wrap:wrap;
gap:8px;
}

.tag{
background:#1f2b4d;
padding:6px 10px;
border-radius:999px;
font-size:12px;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
justify-content:center;
align-items:center;
padding:20px;
z-index:100;
}

.modal-content{
background:#11182d;
padding:28px;
border-radius:24px;
width:min(700px,100%);
}

.modal-content h2{
margin-bottom:20px;
}

input,textarea,select{
width:100%;
padding:14px;
margin-bottom:16px;
border:none;
border-radius:14px;
background:#1a2442;
color:white;
}

textarea{
min-height:120px;
resize:vertical;
}

.save-btn{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#4f7cff;
color:white;
font-weight:700;
cursor:pointer;
}

@media(max-width:900px){

body{
flex-direction:column;
}

.sidebar{
width:100%;
height:auto;
display:flex;
overflow:auto;
gap:12px;
}

.menu{
flex-direction:row;
}

.main{
padding:18px;
}

.grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
Matsu AI OS
</div>

<div class="menu">

<div class="menu-item">🏢 不動産</div>
<div class="menu-item">🤖 AI</div>
<div class="menu-item">💰 投資</div>
<div class="menu-item">🧠 思考</div>
<div class="menu-item">🚗 ライフ</div>

</div>

</div>

<div class="main">

<div class="topbar">

<div class="search">
<input id="searchInput" placeholder="Search Knowledge...">
</div>

<button class="add-btn" onclick="openModal()">
＋ 新規追加
</button>

</div>

<div class="grid" id="grid"></div>

</div>

<div class="modal" id="modal">

<div class="modal-content">

<h2>Knowledge追加</h2>

<input id="title" placeholder="タイトル">

<select id="importance">
<option value="high">high</option>
<option value="mid">mid</option>
<option value="low">low</option>
</select>

<input id="tags" placeholder="タグ（カンマ区切り）">

<input id="url" placeholder="URL">

<textarea id="summary" placeholder="要約"></textarea>

<button class="save-btn" onclick="saveKnowledge()">
保存
</button>

</div>

</div>

<script>

let knowledge = JSON.parse(localStorage.getItem("knowledge") || "[]")

function render(data=knowledge){

const grid = document.getElementById("grid")

grid.innerHTML=""

data.forEach((item,index)=>{

grid.innerHTML += `

<div class="card" onclick="window.open('${item.url}','_blank')">

<div class="card-top">

<div class="badge ${item.importance}">
${item.importance}
</div>

</div>

<div class="card-title">
${item.title}
</div>

<div class="card-summary">
${item.summary}
</div>

<div class="tags">

${item.tags.map(tag=>`
<div class="tag">${tag}</div>
`).join("")}

</div>

</div>

`

})

localStorage.setItem("knowledge",JSON.stringify(knowledge))

}

function openModal(){

document.getElementById("modal").style.display="flex"

}

function saveKnowledge(){

const item={

title:document.getElementById("title").value,
importance:document.getElementById("importance").value,
url:document.getElementById("url").value,
summary:document.getElementById("summary").value,
tags:document.getElementById("tags").value.split(",")

}

knowledge.unshift(item)

render()

document.getElementById("modal").style.display="none"

}

document.getElementById("searchInput").addEventListener("input",(e)=>{

const q = e.target.value.toLowerCase()

const filtered = knowledge.filter(item=>

item.title.toLowerCase().includes(q) ||
item.summary.toLowerCase().includes(q)

)

render(filtered)

})

render()

</script>

</body>
</html>
