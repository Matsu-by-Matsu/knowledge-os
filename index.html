<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Matsu AI OS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:
radial-gradient(circle at top left,#1e3a8a33 0%,transparent 30%),
radial-gradient(circle at bottom right,#06b6d433 0%,transparent 30%),
#050816;
color:#fff;
min-height:100vh;
display:grid;
grid-template-columns:280px 1fr;
}
.sidebar{
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border-right:1px solid rgba(255,255,255,.08);
padding:24px;
}
.logo{
font-size:30px;
font-weight:900;
margin-bottom:8px;
}
.sub{
font-size:12px;
opacity:.6;
margin-bottom:28px;
}
.nav{
display:flex;
flex-direction:column;
gap:10px;
}
.nav div{
padding:14px 16px;
border-radius:16px;
background:rgba(255,255,255,.04);
cursor:pointer;
transition:.2s;
font-weight:700;
}
.nav div:hover{
background:rgba(91,124,250,.2);
transform:translateX(3px);
}
.main{
padding:28px;
}
.top{
display:flex;
gap:14px;
margin-bottom:24px;
}
.search{
flex:1;
}
.search input{
width:100%;
padding:16px;
border:none;
border-radius:18px;
background:rgba(255,255,255,.07);
color:white;
}
button{
border:none;
padding:16px 20px;
border-radius:18px;
background:linear-gradient(135deg,#5b7cfa,#7c3aed);
color:white;
font-weight:800;
cursor:pointer;
}
.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
margin-bottom:22px;
}
.stat{
padding:20px;
border-radius:22px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
}
.stat b{
font-size:34px;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:18px;
}
.card{
padding:22px;
border-radius:24px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(18px);
transition:.25s;
}
.card:hover{
transform:translateY(-4px);
border-color:#5b7cfa;
}
.badge{
display:inline-block;
padding:6px 10px;
border-radius:999px;
font-size:12px;
font-weight:800;
margin-bottom:14px;
}
.high{background:#ef444433;color:#fecaca}
.mid{background:#f59e0b33;color:#fde68a}
.low{background:#22c55e33;color:#bbf7d0}
.title{
font-size:22px;
font-weight:800;
margin-bottom:10px;
line-height:1.4;
}
.summary{
opacity:.75;
line-height:1.7;
font-size:14px;
margin-bottom:14px;
}
.tags{
display:flex;
flex-wrap:wrap;
gap:8px;
}
.tag{
background:#1e3a8a55;
padding:6px 10px;
border-radius:999px;
font-size:12px;
}
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
align-items:center;
justify-content:center;
padding:20px;
}
.modal-content{
width:min(700px,100%);
background:#0f172a;
padding:28px;
border-radius:28px;
}
.modal-content input,
.modal-content textarea,
.modal-content select{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:rgba(255,255,255,.07);
color:white;
margin-bottom:14px;
}
.modal-content textarea{
min-height:120px;
}
@media(max-width:900px){
body{grid-template-columns:1fr}
.sidebar{border-right:none;border-bottom:1px solid rgba(255,255,255,.08)}
.stats{grid-template-columns:1fr}
.grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="sidebar">
<div class="logo">Matsu AI OS</div>
<div class="sub">Personal Knowledge Intelligence System</div>

<div class="nav">
<div>🏢 Real Estate</div>
<div>🤖 AI Business</div>
<div>📈 Investment</div>
<div>🧠 Thinking</div>
<div>🚗 Lifestyle</div>
</div>
</div>

<div class="main">

<div class="top">
<div class="search">
<input id="search" placeholder="Search knowledge...">
</div>

<button onclick="openModal()">＋ Add</button>
</div>

<div class="stats">
<div class="stat">
<div>Total Nodes</div>
<b id="totalCount">0</b>
</div>

<div class="stat">
<div>High Importance</div>
<b id="highCount">0</b>
</div>

<div class="stat">
<div>Categories</div>
<b>5</b>
</div>
</div>

<div class="grid" id="grid"></div>
</div>

<div class="modal" id="modal">
<div class="modal-content">

<h2 style="margin-bottom:18px">Add Knowledge</h2>

<input id="title" placeholder="Title">

<select id="importance">
<option value="high">high</option>
<option value="mid">mid</option>
<option value="low">low</option>
</select>

<input id="tags" placeholder="Tags (comma separated)">

<input id="url" placeholder="URL">

<textarea id="summary" placeholder="Summary"></textarea>

<button onclick="saveKnowledge()">Save</button>

</div>
</div>

<script>

const seed = [
{
title:"Knowledge OS構築",
importance:"high",
summary:"ChatGPT / Claude / NotebookLM を統合して知識DB化する構想。",
tags:["AI","Knowledge","OS"],
url:""
},
{
title:"Synth X ブランド設計",
importance:"high",
summary:"新結合をテーマにしたAI会社名・ロゴ・カラー設計。",
tags:["Synth X","Branding"],
url:""
},
{
title:"Omotesando Court",
importance:"high",
summary:"表参道案件のIRR、定借化、価値向上シナリオ。",
tags:["Real Estate","IRR"],
url:""
}
]

let knowledge = JSON.parse(localStorage.getItem("knowledge")) || seed

function render(data=knowledge){

const grid=document.getElementById("grid")
grid.innerHTML=""

document.getElementById("totalCount").innerText=knowledge.length
document.getElementById("highCount").innerText=
knowledge.filter(x=>x.importance==="high").length

data.forEach(item=>{

grid.innerHTML += `
<div class="card" onclick="openLink('${item.url}')">

<div class="badge ${item.importance}">
${item.importance}
</div>

<div class="title">
${item.title}
</div>

<div class="summary">
${item.summary}
</div>

<div class="tags">
${item.tags.map(tag=>`
<div class="tag">${tag}</div>
`).join("")}
</div>

</div>
`

})

localStorage.setItem("knowledge",JSON.stringify(knowledge))

}

function openLink(url){
if(url){
window.open(url,"_blank")
}
}

function openModal(){
document.getElementById("modal").style.display="flex"
}

function saveKnowledge(){

const item = {
title:document.getElementById("title").value,
importance:document.getElementById("importance").value,
tags:document.getElementById("tags").value.split(","),
url:document.getElementById("url").value,
summary:document.getElementById("summary").value
}

knowledge.unshift(item)

document.getElementById("modal").style.display="none"

render()

}

document.getElementById("search").addEventListener("input",(e)=>{

const q=e.target.value.toLowerCase()

const filtered=knowledge.filter(item=>
item.title.toLowerCase().includes(q) ||
item.summary.toLowerCase().includes(q)
)

render(filtered)

})

render()

</script>

</body>
</html>
