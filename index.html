<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Matsu AI OS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:
radial-gradient(circle at top left,#1b2a52 0%,transparent 30%),
radial-gradient(circle at bottom right,#0e7490 0%,transparent 25%),
#050816;
color:white;
height:100vh;
overflow:hidden;
display:flex;
}

.sidebar{
width:300px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(24px);
border-right:1px solid rgba(255,255,255,.08);
padding:28px;
display:flex;
flex-direction:column;
gap:24px;
}

.logo{
font-size:32px;
font-weight:800;
letter-spacing:-1px;
}

.subtitle{
opacity:.6;
font-size:13px;
margin-top:-14px;
}

.nav{
display:flex;
flex-direction:column;
gap:10px;
}

.nav-item{
padding:16px 18px;
border-radius:18px;
background:rgba(255,255,255,.03);
cursor:pointer;
transition:.25s;
font-weight:600;
}

.nav-item:hover{
background:rgba(79,124,255,.18);
transform:translateX(4px);
}

.main{
flex:1;
padding:32px;
overflow:auto;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:32px;
gap:18px;
}

.search{
flex:1;
position:relative;
}

.search input{
width:100%;
padding:18px 22px;
border:none;
border-radius:22px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(12px);
color:white;
font-size:15px;
outline:none;
}

.search input::placeholder{
color:rgba(255,255,255,.4);
}

.add-btn{
padding:16px 22px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,#4f7cff,#7c4dff);
color:white;
font-weight:700;
cursor:pointer;
font-size:15px;
box-shadow:0 10px 30px rgba(79,124,255,.3);
transition:.25s;
}

.add-btn:hover{
transform:translateY(-2px) scale(1.02);
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
margin-bottom:28px;
}

.stat{
padding:24px;
border-radius:24px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
}

.stat-title{
opacity:.6;
font-size:13px;
margin-bottom:10px;
}

.stat-value{
font-size:34px;
font-weight:800;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
gap:22px;
}

.card{
padding:24px;
border-radius:28px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(18px);
transition:.3s;
cursor:pointer;
position:relative;
overflow:hidden;
}

.card:before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(135deg,rgba(79,124,255,.12),transparent);
opacity:0;
transition:.3s;
}

.card:hover:before{
opacity:1;
}

.card:hover{
transform:translateY(-6px);
border-color:rgba(79,124,255,.4);
box-shadow:0 20px 40px rgba(0,0,0,.35);
}

.card-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.badge{
padding:7px 12px;
border-radius:999px;
font-size:12px;
font-weight:800;
}

.high{
background:#ff4d4f;
}

.mid{
background:#faad14;
}

.low{
background:#22c55e;
}

.card-title{
font-size:22px;
font-weight:700;
line-height:1.4;
margin-bottom:14px;
}

.card-summary{
opacity:.72;
line-height:1.8;
font-size:14px;
margin-bottom:18px;
}

.tags{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.tag{
padding:8px 12px;
border-radius:999px;
background:rgba(79,124,255,.14);
font-size:12px;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.65);
backdrop-filter:blur(12px);
justify-content:center;
align-items:center;
padding:20px;
z-index:100;
}

.modal-content{
width:min(760px,100%);
padding:34px;
border-radius:34px;
background:#0f172a;
border:1px solid rgba(255,255,255,.08);
}

.modal-content h2{
font-size:30px;
margin-bottom:24px;
}

input,textarea,select{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:rgba(255,255,255,.06);
color:white;
margin-bottom:18px;
font-size:15px;
outline:none;
}

textarea{
min-height:140px;
resize:vertical;
}

.save-btn{
width:100%;
padding:18px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,#4f7cff,#7c4dff);
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
}

@media(max-width:900px){

body{
flex-direction:column;
overflow:auto;
}

.sidebar{
width:100%;
border-right:none;
border-bottom:1px solid rgba(255,255,255,.08);
}

.stats{
grid-template-columns:1fr;
}

.grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="sidebar">

<div>
<div class="logo">
Matsu AI OS
</div>

<div class="subtitle">
Personal Knowledge Intelligence System
</div>
</div>

<div class="nav">
<div class="nav-item">🏢 Real Estate</div>
<div class="nav-item">🤖 AI Business</div>
<div class="nav-item">📈 Investment</div>
<div class="nav-item">🧠 Thinking</div>
<div class="nav-item">🚗 Lifestyle</div>
</div>

</div>

<div class="main">

<div class="topbar">

<div class="search">
<input id="searchInput" placeholder="Search thoughts, projects, knowledge...">
</div>

<button class="add-btn" onclick="openModal()">
＋ Add Knowledge
</button>

</div>

<div class="stats">

<div class="stat">
<div class="stat-title">Knowledge Nodes</div>
<div class="stat-value" id="countStat">0</div>
</div>

<div class="stat">
<div class="stat-title">High Importance</div>
<div class="stat-value" id="highStat">0</div>
</div>

<div class="stat">
<div class="stat-title">Categories</div>
<div class="stat-value">5</div>
</div>

</div>

<div class="grid" id="grid"></div>

</div>

<div class="modal" id="modal">

<div class="modal-content">

<h2>Create Knowledge</h2>

<input id="title" placeholder="Title">

<select id="importance">
<option value="high">high</option>
<option value="mid">mid</option>
<option value="low">low</option>
</select>

<input id="tags" placeholder="Tags (comma separated)">

<input id="url" placeholder="URL">

<textarea id="summary" placeholder="Summary"></textarea>

<button class="save-btn" onclick="saveKnowledge()">
Save Knowledge
</button>

</div>

</div>

<script>

let knowledge = JSON.parse(localStorage.getItem("knowledge") || "[]")

function updateStats(){

document.getElementById("countStat").innerText=knowledge.length

document.getElementById("highStat").innerText=
knowledge.filter(k=>k.importance==="high").length

}

function render(data=knowledge){

const grid=document.getElementById("grid")

grid.innerHTML=""

data.forEach(item=>{

grid.innerHTML += `

<div class="card" onclick="window.open('${item.url}','_blank')">

<div class="card-top">

<div class="badge ${item.importance}">
${item.importance}
</div>

</div>

<div class="card-title">
${item.title}
</div>

<div class="card-summary">
${item.summary}
</div>

<div class="tags">

${item.tags.map(tag=>`
<div class="tag">${tag}</div>
`).join("")}

</div>

</div>

`

})

localStorage.setItem("knowledge",JSON.stringify(knowledge))

updateStats()

}

function openModal(){

document.getElementById("modal").style.display="flex"

}

function saveKnowledge(){

const item={

title:document.getElementById("title").value,
importance:document.getElementById("importance").value,
url:document.getElementById("url").value,
summary:document.getElementById("summary").value,
tags:document.getElementById("tags").value.split(",")

}

knowledge.unshift(item)

render()

document.getElementById("modal").style.display="none"

}

document.getElementById("searchInput").addEventListener("input",(e)=>{

const q=e.target.value.toLowerCase()

const filtered=knowledge.filter(item=>

item.title.toLowerCase().includes(q) ||
item.summary.toLowerCase().includes(q)

)

render(filtered)

})

render()

</script>

</body>
</html>
